<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-shell">
        <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

        <aside id="sidebar" class="sidebar" aria-label="Conversation controls">
            <div class="sidebar-top">
                <div class="brand">
                    <span class="brand-icon" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                        </svg>
                    </span>
                    <div class="brand-text">
                        <span class="brand-name">TalkFlow</span>
                        <span class="brand-tag">Document AI</span>
                    </div>
                </div>
                <button id="new-chat-btn" class="btn btn-primary btn-block" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    New chat
                </button>
            </div>

            <section class="side-section">
                <div class="section-head">
                    <h2>Recent</h2>
                    <button id="refresh-history-btn" class="btn btn-icon btn-ghost" type="button" title="Refresh">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                        </svg>
                    </button>
                </div>
                <div id="conversation-list" class="history-list">
                    <p class="muted-text">No conversations yet</p>
                </div>
            </section>

            <div class="sidebar-footer">
                <button id="clear-history-btn" class="btn btn-ghost btn-block btn-subtle" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Clear history
                </button>
            </div>
        </aside>

        <main class="chat-shell">
            <header class="chat-header">
                <div class="header-title">
                    <h1>TalkFlow</h1>
                    <span class="header-sub">Chat with your documents</span>
                </div>
            </header>

            <div class="chat-body">
                <section id="chat-box" class="messages" aria-live="polite"></section>

                <section class="composer">
                    <div class="composer-card">
                        <div id="uploaded-files-list" class="uploaded-files-list" style="display: none;"></div>
                        <div class="composer-input-wrap">
                            <textarea
                                id="user-input"
                                rows="1"
                                placeholder="Message TalkFlow or ask about your PDF..."
                                aria-label="Type your message"
                            ></textarea>
                            <div class="composer-actions">
                                <input id="file-input" type="file" accept=".pdf,.txt,.doc,.docx" hidden>
                                <button id="upload-btn" class="btn btn-icon btn-ghost" type="button" title="Attach PDF">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                                    </svg>
                                </button>
                                <button id="send-btn" class="btn btn-icon btn-send" type="button" title="Send" aria-label="Send message">
                                    <svg class="send-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                        <path d="M12 19V5M5 12l7-7 7 7"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p id="upload-status" class="composer-upload-status"></p>
                    </div>
                    <p class="composer-hint">Enter to send · Shift+Enter for new line · PDF supported</p>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
