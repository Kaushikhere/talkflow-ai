<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkFlow AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="Conversation controls">
            <div class="sidebar-top">
                <div class="brand">
                    <span class="brand-icon">TF</span>
                    <span>TalkFlow</span>
                </div>
                <button id="new-chat-btn" class="btn btn-primary" type="button">+ New chat</button>
            </div>

            <section class="side-section">
                <div class="section-head">
                    <h2>History</h2>
                    <button id="refresh-history-btn" class="btn btn-ghost" type="button">Refresh</button>
                </div>
                <div id="history-list" class="history-list">
                    <p class="muted-text">No messages yet.</p>
                </div>
                <button id="clear-history-btn" class="btn btn-danger" type="button">Clear history</button>
            </section>
        </aside>

        <main class="chat-shell">
            <header class="chat-header">
                <h1>TalkFlow AI</h1>
                <span id="status-text">Ready</span>
            </header>

            <section id="chat-box" class="messages" aria-live="polite">
                <div class="welcome-panel">
                    <h2>How can I help today?</h2>
                    <div id="suggestion-list" class="suggestion-list">
                        <button class="suggestion-chip" type="button" data-prompt="Explain this project architecture in simple terms.">Explain project architecture</button>
                        <button class="suggestion-chip" type="button" data-prompt="Help me improve this app UI and UX.">Improve UI/UX steps</button>
                        <button class="suggestion-chip" type="button" data-prompt="Generate a clear API documentation draft for this backend.">Draft backend API docs</button>
                    </div>
                </div>
            </section>

            <section class="composer">
                <div class="composer-input-wrap">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Message TalkFlow..."
                        aria-label="Type your message"
                    ></textarea>
                    <input id="file-input" type="file" hidden>
                    <button id="upload-btn" class="btn btn-ghost" type="button">Upload</button>
                    <button id="send-btn" class="btn btn-send" type="button">Send</button>
                </div>
                <p id="upload-status" class="composer-upload-status">Click Upload and choose a file.</p>
                <p class="composer-hint">Enter to send, Shift+Enter for new line.</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
