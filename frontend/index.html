<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkFlow — Care Document AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css?v=12">
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="ambient-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-shell">
        <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

        <aside id="sidebar" class="sidebar" aria-label="Conversation controls">
            <div class="sidebar-top">
                <div class="brand">
                    <span class="brand-icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                        </svg>
                    </span>
                    <div class="brand-text">
                        <span class="brand-name">TalkFlow</span>
                        <span class="brand-tag">Care Health · Document AI</span>
                    </div>
                </div>
                <button id="new-chat-btn" class="btn btn-primary btn-block" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    New chat
                </button>
            </div>

            <section class="side-section kb-panel" id="kb-panel" hidden>
                <div class="kb-panel-card">
                    <div class="section-head">
                        <h2>Knowledge base</h2>
                        <span class="kb-panel-badge">Care</span>
                    </div>
                    <label class="kb-toggle" for="kb-toggle-input">
                        <input id="kb-toggle-input" type="checkbox" checked>
                        <span class="kb-toggle-track" aria-hidden="true"></span>
                        <span class="kb-toggle-label">Use product brochures</span>
                    </label>
                    <span id="kb-status" class="kb-status kb-panel-status" hidden></span>
                </div>
            </section>

            <section class="side-section side-section-history">
                <div class="section-head">
                    <h2>Recent chats</h2>
                </div>
                <div id="conversation-list" class="history-list">
                    <p class="muted-text">No conversations yet</p>
                </div>
            </section>

            <section class="side-section kb-docs-panel" id="kb-docs-panel" hidden>
                <div class="section-head">
                    <h2>Care docs</h2>
                </div>
                <div class="kb-docs-upload">
                    <input id="kb-file-input" type="file" accept=".pdf,application/pdf" hidden>
                    <div id="kb-dropzone" class="kb-dropzone" role="button" aria-label="Upload Care PDF">
                        <span class="kb-dropzone-spinner" aria-hidden="true"></span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        <span class="kb-dropzone-label">Upload PDF to knowledge base</span>
                    </div>
                    <p id="kb-upload-msg" class="kb-upload-msg" aria-live="polite"></p>
                </div>
            </section>

            <div class="sidebar-footer">
                <button id="summarize-chat-btn" class="btn btn-ghost btn-block" type="button" disabled title="Summarize this conversation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                    </svg>
                    Summarize chat
                </button>
                <button id="theme-toggle-btn" class="btn btn-ghost btn-block" type="button" title="Toggle theme">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <span id="theme-toggle-label">Light mode</span>
                </button>
                <button id="clear-history-btn" class="btn btn-ghost btn-block btn-subtle" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Clear history
                </button>
            </div>
        </aside>

        <main class="chat-shell">
            <header class="mobile-header">
                <button id="menu-btn" class="btn btn-icon btn-ghost menu-btn" type="button" title="Menu" aria-label="Open menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </header>
            <div class="chat-body">
                <section id="chat-box" class="messages" aria-live="polite"></section>

                <section class="composer">
                    <div class="composer-card">
                        <div id="uploaded-files-list" class="uploaded-files-list" style="display: none;"></div>
                        <div class="composer-input-wrap">
                            <textarea
                                id="user-input"
                                rows="1"
                                placeholder="Ask about a policy, plan, or your upload…"
                                aria-label="Type your message"
                            ></textarea>
                            <div class="composer-actions">
                                <input id="file-input" type="file" accept=".pdf,.txt,.jpg,.jpeg,.png,.webp,.gif,.bmp" hidden>
                                <button id="upload-btn" class="btn btn-icon btn-ghost" type="button" title="Attach file">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                                    </svg>
                                </button>
                                <button id="send-btn" class="btn btn-icon btn-send" type="button" title="Send" aria-label="Send message">
                                    <svg class="send-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                        <path d="M12 19V5M5 12l7-7 7 7"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p id="upload-status" class="composer-upload-status"></p>
                    </div>
                    <p id="composer-hint" class="composer-hint">Enter to send · Shift+Enter for new line · Attach PDF or images</p>
                </section>
            </div>
        </main>
    </div>

    <script src="/frontend/script.js?v=16"></script>
</body>
</html>
